# =============================================================================
# PathPilot Nginx Configuration
# Serves the React SPA and proxies /api/* to the FastAPI backend container.
# =============================================================================
server {
    listen 80;
    server_name _;

    # Gzip compression for faster asset delivery
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # Static assets from Vite build
    root /usr/share/nginx/html;
    index index.html;

    # ── API Reverse Proxy ─────────────────────────────────────────────────────
    # All /api/* requests are forwarded to the FastAPI backend container.
    # "backend" is the Docker Compose service name — resolved via internal DNS.
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Allow large request bodies (file uploads)
        client_max_body_size 50M;
    }

    # ── React SPA Routing ─────────────────────────────────────────────────────
    # All non-asset paths fall through to index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets aggressively ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Nginx health check endpoint ───────────────────────────────────────────
    location /nginx-health {
        return 200 'healthy\n';
        add_header Content-Type text/plain;
    }
}
